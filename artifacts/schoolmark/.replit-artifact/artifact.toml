kind = "web"
previewPath = "/"
title = "SchoolMark"
version = "1.0.0"
id = "artifacts/schoolmark"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24856

[services.development]
run = "pnpm --filter @workspace/schoolmark run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/schoolmark", "run", "build" ]
serve = "static"
publicDir = "artifacts/schoolmark/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24856"
BASE_PATH = "/"
